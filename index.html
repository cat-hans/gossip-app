<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="רכילות">
<meta name="theme-color" content="#880E4F">
<title>רכילות בעברית 💅</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#C2185B;--pink-dark:#880E4F;--pink-light:#FCE4EC;--gold:#FFD54F;--bg:#FFF0F5;--text:#1a0010;--muted:#8D6B78;--border:rgba(194,24,91,0.15);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.status-bar{height:var(--safe-top);background:var(--pink-dark)}
.header{background:linear-gradient(135deg,var(--pink-dark),var(--pink));padding:12px 14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(136,14,79,0.3)}
.header-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-brand{display:flex;align-items:center;gap:8px}
.header-emoji{font-size:22px}
.header-text h1{font-size:18px;font-weight:900;color:white;letter-spacing:-0.5px;line-height:1}
.header-text p{font-size:10px;color:rgba(255,255,255,0.7);margin-top:1px}
.hbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,0.35)}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;padding:8px 34px 8px 12px;border-radius:20px;border:none;background:rgba(255,255,255,0.2);color:white;font-family:'Heebo',sans-serif;font-size:13px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.55)}
.search-input:focus{background:rgba(255,255,255,0.3)}
.search-x{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.7);font-size:15px;cursor:pointer;display:none;line-height:1;padding:0}
.search-go-btn{padding:8px 14px;background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;color:white;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.search-go-btn:active{background:rgba(255,255,255,0.4)}
.tabs{display:flex;background:white;border-bottom:1px solid var(--border);position:sticky;top:100px;z-index:99;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:55px;padding:9px 3px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:2px}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:700}
.page{display:none;padding:12px;padding-bottom:calc(24px + var(--safe-bottom))}
.page.active{display:block}
.feed-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.update-time{font-size:11px;color:var(--muted)}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;border:none;border-radius:50px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(194,24,91,0.3)}
.refresh-btn:active{transform:scale(0.96)}
.refresh-btn:disabled{opacity:0.6}
.spin{animation:spin 0.8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.search-banner{background:white;border:1px solid var(--border);border-radius:12px;padding:9px 13px;margin-bottom:9px;font-size:12px;color:var(--muted);display:none;align-items:center;justify-content:space-between;gap:8px}
.search-banner.show{display:flex}
.search-banner strong{color:var(--pink-dark)}
.search-clear-btn{padding:3px 9px;border:1.5px solid var(--border);border-radius:20px;background:white;font-family:'Heebo',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.filter-bar{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.fchip.active{background:var(--pink);border-color:var(--pink);color:white}
.fchip.il-chip{border-color:rgba(21,101,192,0.25);color:#1565C0}
.fchip.il-chip.active{background:#1565C0;border-color:#1565C0;color:white}
.count-bar{display:flex;align-items:center;gap:6px;margin-bottom:11px}
.count-label{font-size:11px;color:var(--muted);white-space:nowrap}
.count-pills{display:flex;gap:4px;flex-wrap:wrap}
.cpill{padding:3px 9px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.cpill.active{background:var(--pink);border-color:var(--pink);color:white}
.article-card{background:white;border-radius:16px;margin-bottom:11px;overflow:hidden;box-shadow:0 2px 10px rgba(194,24,91,0.07);border:1px solid var(--border);animation:fadeUp 0.3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:100%;height:180px;object-fit:cover;display:block}
.card-source-bar{background:linear-gradient(90deg,var(--pink-light),white);padding:5px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.source-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);flex-shrink:0}
.source-name{font-size:10px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:0.5px}
.pub-time{font-size:10px;color:var(--muted);margin-right:auto}
.badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:20px;flex-shrink:0}
.badge-new{background:var(--gold);color:#5d4037}
.badge-rec{background:linear-gradient(135deg,#880E4F,#C2185B);color:white}
.badge-il{background:#e8f4fd;color:#1565C0}
.badge-search{background:#e8f5e9;color:#2e7d32}
.card-body{padding:11px 13px 9px}
.card-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:6px}
.card-summary{font-size:12px;font-weight:300;color:#5a3a48;line-height:1.6;margin-bottom:9px}
.card-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-link{font-size:11px;color:var(--pink);font-weight:500;text-decoration:none;margin-right:auto}
.action-btn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:3px;flex-shrink:0}
.action-btn:active{background:var(--pink-light)}
.action-btn.saved{color:var(--pink);border-color:var(--pink);background:var(--pink-light)}
.wa-btn{color:#25D366;border-color:rgba(37,211,102,0.3)}
.wa-btn:active{background:#f0fff4}
.rating-bar{display:flex;align-items:center;gap:5px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.rating-label{font-size:10px;color:var(--muted);white-space:nowrap}
.stars-row{display:flex;gap:1px}
.star-btn{width:26px;height:26px;border:none;background:none;font-size:18px;cursor:pointer;padding:0;line-height:1;opacity:0.22;transition:opacity 0.15s,transform 0.15s}
.star-btn.lit{opacity:1}
.star-btn:active{transform:scale(1.3)}
.rating-txt{font-size:10px;color:var(--muted)}
.learn-info{background:rgba(136,14,79,0.05);border:1px solid var(--border);border-radius:12px;padding:10px 13px;margin-bottom:11px;font-size:11px;color:var(--muted);line-height:1.6}
.learn-info strong{color:var(--pink-dark)}
.skeleton-card{background:white;border-radius:16px;margin-bottom:11px;overflow:hidden;border:1px solid var(--border)}
.skel{background:linear-gradient(90deg,#f0d6e4 25%,#f8e8f0 50%,#f0d6e4 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty-state{text-align:center;padding:45px 20px}
.empty-emoji{font-size:44px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:7px}
.empty-sub{font-size:12px;color:var(--muted);line-height:1.6}
.section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;margin-top:16px}
.section-label:first-child{margin-top:0}
.section-label.il{color:#1565C0}
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px;margin-bottom:13px}
.preset-btn{padding:7px 4px;border:1.5px solid var(--border);border-radius:11px;background:white;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--pink-dark);cursor:pointer;text-align:center}
.preset-btn:active{background:var(--pink-light)}
.preset-btn.added{background:var(--pink-light);border-color:var(--pink);color:var(--pink)}
.preset-btn.il-btn{color:#1565C0;border-color:rgba(21,101,192,0.2)}
.preset-btn.il-btn.added{background:#e8f4fd;border-color:#1565C0}
.add-form{display:flex;gap:7px;margin-bottom:5px}
.add-form input{flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:11px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);background:white;direction:ltr;text-align:left;outline:none}
.add-form input:focus{border-color:var(--pink)}
.add-form input.il:focus{border-color:#1565C0}
.add-btn{padding:9px 13px;background:var(--pink);color:white;border:none;border-radius:11px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.add-btn.il{background:#1565C0}
.err-msg{font-size:11px;color:#c62828;margin-bottom:9px;min-height:15px}
.site-item{display:flex;align-items:center;gap:9px;padding:10px 11px;background:white;border-radius:13px;margin-bottom:6px;border:1px solid var(--border)}
.site-item.il{border-color:rgba(21,101,192,0.2)}
.site-icon{width:32px;height:32px;border-radius:9px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.site-icon.il{background:#e8f4fd}
.site-info{flex:1;min-width:0}
.site-info-name{font-size:13px;font-weight:700;color:var(--text)}
.site-info-url{font-size:10px;color:var(--muted);direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{width:26px;height:26px;border-radius:50%;border:none;background:none;color:#ccc;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.star-input-form{display:flex;gap:7px;margin-bottom:5px}
.star-input-form input{flex:1;padding:9px 11px;border:1.5px solid rgba(255,193,7,0.4);border-radius:11px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);background:white;outline:none}
.star-input-form input:focus{border-color:var(--gold)}
.star-add-btn{padding:9px 13px;background:linear-gradient(135deg,#FFD54F,#FFA000);color:#5d4037;border:none;border-radius:11px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.star-item{display:flex;align-items:center;gap:9px;padding:10px 11px;background:white;border-radius:13px;margin-bottom:6px;border:1px solid rgba(255,193,7,0.3)}
.star-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#FFD54F,#FFA000);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#5d4037;flex-shrink:0}
.star-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.star-del{width:26px;height:26px;border-radius:50%;border:none;background:none;color:#ccc;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.saved-meta{font-size:11px;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.clear-btn{padding:3px 9px;border:1.5px solid var(--border);border-radius:20px;background:white;font-family:'Heebo',sans-serif;font-size:10px;color:var(--muted);cursor:pointer}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="header">
  <div class="header-row1">
    <div class="header-brand">
      <div class="header-emoji">💅</div>
      <div class="header-text"><h1>רכילות</h1><p>חדשות כוכבים</p></div>
    </div>
    <button class="hbtn" onclick="switchTab('sites')">⚙</button>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="🔍 חפש שם, נושא..." autocomplete="off" autocorrect="off" autocapitalize="off" onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="search-x" id="search-x" onclick="clearSearch()">✕</button>
    </div>
    <button class="search-go-btn" onclick="doSearch()">חפש</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tb-feed" onclick="switchTab('feed')">📰 פיד</button>
  <button class="tab-btn" id="tb-saved" onclick="switchTab('saved')">⭐ שמורות</button>
  <button class="tab-btn" id="tb-stars" onclick="switchTab('stars')">🌟 כוכבים</button>
  <button class="tab-btn" id="tb-sites" onclick="switchTab('sites')">🌐 אתרים</button>
</div>

<div class="page active" id="page-feed">
  <div class="feed-top">
    <div class="update-time" id="update-time">לחץ רענן לטעינה</div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadFeed()"><span id="refresh-icon">⟳</span> רענן</button>
  </div>
  <div class="search-banner" id="search-banner">
    <span>תוצאות: <strong id="search-term-lbl"></strong></span>
    <button class="search-clear-btn" onclick="clearSearch()">✕ נקה</button>
  </div>
  <div class="filter-bar">
    <button class="fchip active" id="chip-all" onclick="setView('all',this)">הכל</button>
    <button class="fchip" id="chip-rec" onclick="toggleRec(this)">✨ מומלץ</button>
    <button class="fchip" id="chip-mystars" onclick="setView('stars',this)">⭐ כוכבים שלי</button>
    <button class="fchip" id="chip-en" onclick="setView('en',this)">🌍 חו"ל</button>
    <button class="fchip il-chip" id="chip-il" onclick="setView('il',this)">🇮🇱 ישראל</button>
  </div>
  <div class="count-bar">
    <div class="count-label">כמות:</div>
    <div class="count-pills">
      <button class="cpill active" id="cpill-3" onclick="setCount(3)">3</button>
      <button class="cpill" id="cpill-5" onclick="setCount(5)">5</button>
      <button class="cpill" id="cpill-7" onclick="setCount(7)">7</button>
      <button class="cpill" id="cpill-10" onclick="setCount(10)">10</button>
      <button class="cpill" id="cpill-20" onclick="setCount(20)">20</button>
      <button class="cpill" id="cpill-30" onclick="setCount(30)">30</button>
    </div>
  </div>
  <div id="feed-content">
    <div class="empty-state"><div class="empty-emoji">📡</div><div class="empty-title">מוכן לרכילות!</div><div class="empty-sub">לחץ "רענן" לטעינת הכתבות</div></div>
  </div>
</div>

<div class="page" id="page-saved">
  <div id="saved-header"></div><div id="saved-content"></div>
</div>

<div class="page" id="page-stars">
  <div class="section-label">הכוכבים שלי</div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:11px;line-height:1.5">הוסף שמות כוכבים באנגלית — לחץ "כוכבים שלי" בפיד לראות רק כתבות עליהם</p>
  <div class="star-input-form">
    <input type="text" id="star-input" placeholder="Taylor Swift, Beyonce..." autocorrect="off" autocapitalize="words"/>
    <button class="star-add-btn" onclick="addStar()">הוסף ⭐</button>
  </div>
  <div class="err-msg" id="star-err"></div>
  <div id="stars-list"></div>
</div>

<div class="page" id="page-sites">
  <div class="section-label">🌍 אתרים באנגלית</div>
  <div class="preset-grid">
    <button class="preset-btn" onclick="addSite('tmz.com','TMZ','🎬',false,null)">TMZ</button>
    <button class="preset-btn" onclick="addSite('pagesix.com','Page Six','📸',false,null)">Page Six</button>
    <button class="preset-btn" onclick="addSite('people.com','People','⭐',false,null)">People</button>
    <button class="preset-btn" onclick="addSite('eonline.com','E! Online','💃',false,null)">E! Online</button>
    <button class="preset-btn" onclick="addSite('usmagazine.com','Us Weekly','💫',false,null)">Us Weekly</button>
    <button class="preset-btn" onclick="addSite('justjared.com','Just Jared','📷',false,null)">Just Jared</button>
    <button class="preset-btn" onclick="addSite('dailymail.co.uk','Daily Mail','🗞',false,null)">Daily Mail</button>
    <button class="preset-btn" onclick="addSite('hollywoodlife.com','Hollywood Life','🌟',false,null)">HWood Life</button>
    <button class="preset-btn" onclick="addSite('radaronline.com','Radar Online','📡',false,null)">Radar Online</button>
    <button class="preset-btn" onclick="addSite('perezhilton.com','Perez Hilton','💬',false,null)">Perez Hilton</button>
    <button class="preset-btn" onclick="addSite('etonline.com','ET Online','🎬',false,null)">ET Online</button>
    <button class="preset-btn" onclick="addSite('accessonline.com','Access','🎤',false,null)">Access</button>
  </div>
  <div class="add-form">
    <input type="url" id="en-url-input" placeholder="כתובת RSS" inputmode="url" autocomplete="off" autocorrect="off"/>
    <button class="add-btn" onclick="addManual(false)">הוסף</button>
  </div>
  <div class="err-msg" id="en-err-msg"></div>

  <div class="section-label il">🇮🇱 אתרים ישראלים</div>
  <div class="preset-grid">
    <button class="preset-btn il-btn" onclick="addSite('ynet-bidu','ynet בידור','📺',true,'https://ynet.co.il/Integration/StoryRss2.aspx?id=6')">ynet בידור</button>
    <button class="preset-btn il-btn" onclick="addSite('mako-celebs','mako סלבס','🎭',true,'https://mako.co.il/rss/entertainment-celebs.xml')">mako סלבס</button>
  </div>
  <div class="add-form">
    <input type="url" id="il-url-input" class="il" placeholder="כתובת RSS ישראלית" inputmode="url" autocomplete="off" autocorrect="off"/>
    <button class="add-btn il" onclick="addManual(true)">הוסף</button>
  </div>
  <div class="err-msg" id="il-err-msg"></div>

  <div class="section-label">האתרים שלי</div>
  <div id="sites-list"></div>
</div>

<script>
const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
const LABELS = ['','קצת','בינוני','טוב','מעניין','מאוד!'];

let sites=[], stars=[], saved=[], allArticles=[], searchExtra=[];
let filterCount=3, activeView='all', recOn=false, searchQuery='';
let prefs={keywords:{},sources:{},totalRatings:0};

function loadData(){
  try{sites=JSON.parse(localStorage.getItem('g_sites_v4')||'null')||[
    {id:'tmz.com',name:'TMZ',icon:'🎬',il:false,feed:null},
    {id:'pagesix.com',name:'Page Six',icon:'📸',il:false,feed:null},
    {id:'ynet-bidu',name:'ynet בידור',icon:'📺',il:true,feed:'https://ynet.co.il/Integration/StoryRss2.aspx?id=6'},
    {id:'mako-celebs',name:'mako סלבס',icon:'🎭',il:true,feed:'https://mako.co.il/rss/entertainment-celebs.xml'}
  ];}catch(e){sites=[];}
  try{stars=JSON.parse(localStorage.getItem('g_stars')||'[]');}catch(e){stars=[];}
  try{saved=JSON.parse(localStorage.getItem('g_saved')||'[]');}catch(e){saved=[];}
  try{prefs=JSON.parse(localStorage.getItem('g_prefs')||'null')||{keywords:{},sources:{},totalRatings:0};}catch(e){prefs={keywords:{},sources:{},totalRatings:0};}
}
function persist(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

function extractWords(t){return(t||'').toLowerCase().replace(/[^a-zא-ת\s]/g,' ').split(/\s+/).filter(w=>w.length>3);}
function learnFromRating(art,rating){
  const sig=rating-3;
  extractWords((art._origTitle||'')+(art.title||'')).forEach(w=>{
    if(!prefs.keywords[w])prefs.keywords[w]={sum:0,count:0};
    prefs.keywords[w].sum+=sig;prefs.keywords[w].count++;
  });
  const s=art._source;
  if(!prefs.sources[s])prefs.sources[s]={sum:0,count:0};
  prefs.sources[s].sum+=sig;prefs.sources[s].count++;
  prefs.totalRatings=(prefs.totalRatings||0)+1;
  persist('g_prefs',prefs);
}
function unlearnRating(art,old){
  const sig=old-3;
  extractWords((art._origTitle||'')+(art.title||'')).forEach(w=>{
    if(prefs.keywords[w]){prefs.keywords[w].sum-=sig;prefs.keywords[w].count=Math.max(0,prefs.keywords[w].count-1);}
  });
  const s=art._source;
  if(prefs.sources[s]){prefs.sources[s].sum-=sig;prefs.sources[s].count=Math.max(0,prefs.sources[s].count-1);}
  prefs.totalRatings=Math.max(0,(prefs.totalRatings||1)-1);
  persist('g_prefs',prefs);
}
function scoreArticle(art){
  if(prefs.totalRatings<3)return 0;
  let sc=0;
  extractWords((art._origTitle||'')+(art.title||'')).forEach(w=>{
    if(prefs.keywords[w]&&prefs.keywords[w].count>0)sc+=prefs.keywords[w].sum/prefs.keywords[w].count;
  });
  const s=art._source;
  if(prefs.sources[s]&&prefs.sources[s].count>0)sc+=(prefs.sources[s].sum/prefs.sources[s].count)*0.5;
  return sc;
}

function matchesSearch(art,q){
  if(!q)return true;
  const words=q.toLowerCase().split(/\s+/).filter(w=>w);
  const hay=[art.title||'',art._origTitle||'',art.summary||''].join(' ').toLowerCase();
  return words.every(w=>hay.includes(w));
}
function matchStar(art){
  if(!stars.length)return false;
  const hay=[art.title||'',art._origTitle||'',art.summary||''].join(' ').toLowerCase();
  return stars.some(s=>s.toLowerCase().split(/\s+/).filter(w=>w).every(w=>hay.includes(w)));
}
function escId(id){return(id||'').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40);}
function isHebrew(t){return /[\u05D0-\u05EA]/.test(t||'');}
function formatTime(ds){
  if(!ds)return'';const d=new Date(ds);if(isNaN(d))return'';
  const m=Math.floor((Date.now()-d)/60000);
  if(m<1)return'עכשיו';if(m<60)return`לפני ${m} דקות`;
  const h=Math.floor(m/60);if(h<24)return`לפני ${h} שעות`;
  const dy=Math.floor(h/24);if(dy===1)return'אתמול';if(dy<7)return`לפני ${dy} ימים`;
  return d.toLocaleDateString('he-IL');
}

async function doSearch(){
  const val=document.getElementById('search-input').value.trim();
  if(!val)return;
  searchQuery=val;
  document.getElementById('search-x').style.display='block';
  document.getElementById('search-term-lbl').textContent=val;
  document.getElementById('search-banner').classList.add('show');
  renderFeed();
  searchExtra=[];
  try{
    const [r1,r2]=await Promise.all([
      fetch(RSS_PROXY+encodeURIComponent('https://news.google.com/rss/search?q='+val+'&hl=iw&gl=IL&ceid=IL:iw')).then(r=>r.json()).catch(()=>({items:[]})),
      fetch(RSS_PROXY+encodeURIComponent('https://news.google.com/rss/search?q='+val+'&hl=en&gl=US&ceid=US:en')).then(r=>r.json()).catch(()=>({items:[]}))
    ]);
    const combined=[...(r1.items||[]),...(r2.items||[])];
    const existIds=new Set(allArticles.map(a=>a._id));
    const newItems=combined.filter(it=>it.link&&!existIds.has(it.link)).slice(0,15);
    searchExtra=await Promise.all(newItems.map(async it=>{
      const isIL=isHebrew(it.title);
      const desc=(it.description||'').replace(/<[^>]+>/g,'').slice(0,300);
      const[title,summary]=isIL?[it.title,desc]:await Promise.all([tr(it.title),tr(desc)]);
      return{title,summary,_origTitle:it.title,_source:'חיפוש גוגל',_link:it.link,
        _img:extractImg(it),_pubDate:it.pubDate||'',_id:it.link,_rating:0,_il:isIL,_isSearch:true};
    }));
    if(searchQuery===val)renderFeed();
  }catch(e){}
}
function clearSearch(){
  searchQuery='';searchExtra=[];
  document.getElementById('search-input').value='';
  document.getElementById('search-x').style.display='none';
  document.getElementById('search-banner').classList.remove('show');
  renderFeed();
}

function switchTab(tab){
  ['feed','saved','stars','sites'].forEach(t=>{
    document.getElementById('tb-'+t).classList.toggle('active',t===tab);
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='saved')renderSaved();
  if(tab==='stars')renderStars();
  if(tab==='sites')renderSites();
}
function setView(view,el){
  activeView=view;recOn=false;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
  renderFeed();
}
function toggleRec(el){
  recOn=!recOn;el.classList.toggle('active',recOn);
  if(recOn){document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));el.classList.add('active');activeView='all';}
  else document.getElementById('chip-all').classList.add('active');
  renderFeed();
}
function setCount(n){filterCount=n;document.querySelectorAll('.cpill').forEach(el=>el.classList.toggle('active',el.id==='cpill-'+n));}

async function tryRSS(site){
  // If explicit feed URL provided, try it first
  const explicit = site.feed ? [site.feed] : [];
  // Also try standard patterns from domain
  const domain = site.id.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  const auto = [
    `https://${domain}/feed`,
    `https://${domain}/rss`,
    `https://${domain}/rss.xml`,
    `https://feeds.feedburner.com/${domain.split('.')[0]}`,
  ];
  const urls = explicit.length ? [...explicit, ...auto] : auto;
  for(const f of urls){
    try{
      const r=await fetch(RSS_PROXY+encodeURIComponent(f));
      const d=await r.json();
      if(d.status==='ok'&&d.items?.length)return d.items;
    }catch(e){}
  }
  return null;
}
async function tr(text){
  if(!text||!text.trim())return text;
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=he&dt=t&q=${encodeURIComponent(text)}`);
    const d=await r.json();return d[0].map(c=>c[0]).join('');
  }catch(e){return text;}
}
function extractImg(it){
  if(it.enclosure?.link&&/\.(jpg|jpeg|png|webp)/i.test(it.enclosure.link))return it.enclosure.link;
  if(it.thumbnail&&/^https?:\/\//.test(it.thumbnail))return it.thumbnail;
  const m=(it.description||'').match(/<img[^>]+src=["']([^"']+)["']/i);
  if(m&&/^https?:\/\//.test(m[1]))return m[1];return null;
}

async function loadFeed(){
  if(!sites.length){switchTab('sites');return;}
  const btn=document.getElementById('refresh-btn'),icon=document.getElementById('refresh-icon');
  btn.disabled=true;icon.textContent='↻';icon.className='spin';
  document.getElementById('update-time').textContent='טוען...';
  const feedEl=document.getElementById('feed-content');
  feedEl.innerHTML=Array(Math.min(filterCount,5)).fill(skelCard()).join('');

  const results=await Promise.all(sites.map(site=>
    tryRSS(site).then(items=>items?items.map(it=>({...it,_source:site.name,_il:site.il})):[])
  ));
  let raw=results.flat();
  raw.sort((a,b)=>((b.pubDate?new Date(b.pubDate):0)-(a.pubDate?new Date(a.pubDate):0)));
  raw=raw.slice(0,filterCount);

  if(!raw.length){
    feedEl.innerHTML=`<div class="empty-state"><div class="empty-emoji">😔</div><div class="empty-title">לא נטענו כתבות</div><div class="empty-sub">בדוק חיבור לאינטרנט<br>או נסה אתרים אחרים</div></div>`;
    btn.disabled=false;icon.className='';icon.textContent='⟳';
    document.getElementById('update-time').textContent='שגיאה';return;
  }

  feedEl.innerHTML=Array(raw.length).fill(skelCard()).join('');
  allArticles=new Array(raw.length);
  await Promise.all(raw.map(async(it,i)=>{
    const desc=(it.description||'').replace(/<[^>]+>/g,'').slice(0,400);
    const img=extractImg(it);
    const isIL=it._il||isHebrew(it.title);
    const[title,summary]=isIL?[it.title,desc]:await Promise.all([tr(it.title),tr(desc)]);
    allArticles[i]={title,summary,_origTitle:it.title,_source:it._source,_link:it.link,
      _img:img,_pubDate:it.pubDate||'',_id:it.link||(it.title+i),_rating:0,_il:isIL};
  }));
  allArticles=allArticles.filter(Boolean);
  const ratings=JSON.parse(localStorage.getItem('g_ratings')||'{}');
  allArticles.forEach(a=>{const eid=escId(a._id);if(ratings[eid])a._rating=ratings[eid];});
  const now=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('update-time').textContent=`עודכן ${now} • ${allArticles.length} כתבות`;
  btn.disabled=false;icon.className='';icon.textContent='⟳';
  renderFeed();
}

function renderFeed(){
  const feedEl=document.getElementById('feed-content');
  if(!allArticles.length&&!searchQuery)return;
  let arts=[...allArticles];
  if(searchQuery&&searchExtra.length){
    const existIds=new Set(arts.map(a=>a._id));
    arts=[...arts,...searchExtra.filter(a=>!existIds.has(a._id))];
  }
  if(searchQuery)arts=arts.filter(a=>matchesSearch(a,searchQuery));
  if(activeView==='stars')arts=arts.filter(a=>matchStar(a));
  else if(activeView==='en')arts=arts.filter(a=>!a._il);
  else if(activeView==='il')arts=arts.filter(a=>a._il);
  let infoHtml='';
  if(recOn&&!searchQuery){
    if(prefs.totalRatings<3){feedEl.innerHTML=`<div class="empty-state"><div class="empty-emoji">🧠</div><div class="empty-title">עוד לא מספיק מידע</div><div class="empty-sub">דרג לפחות <strong>3 כתבות</strong><br>ואז תראה המלצות מותאמות</div></div>`;return;}
    arts=arts.map(a=>({...a,_score:scoreArticle(a)})).filter(a=>a._score>0).sort((a,b)=>b._score-a._score);
    if(!arts.length){feedEl.innerHTML=`<div class="empty-state"><div class="empty-emoji">🤔</div><div class="empty-title">אין המלצות עדיין</div><div class="empty-sub">המשך לדרג כתבות</div></div>`;return;}
    infoHtml=`<div class="learn-info">✨ <strong>מומלץ לך</strong> — מבוסס על ${prefs.totalRatings} דירוגים שלך.</div>`;
  }
  if(!arts.length){
    feedEl.innerHTML=`<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-title">${searchQuery?'לא נמצאו תוצאות':'אין כתבות'}</div><div class="empty-sub">${searchQuery?'נסה מילה אחרת':'לחץ רענן'}</div></div>`;return;
  }
  feedEl.innerHTML=infoHtml+arts.map((art,i)=>{
    const eid=escId(art._id);
    const isSaved=saved.some(s=>escId(s._id)===eid);
    const timeStr=formatTime(art._pubDate);
    const imgHtml=art._img?`<img class="card-img" src="${art._img}" onerror="this.style.display='none'" loading="lazy">`:'';
    const isNew=i<3&&!recOn&&!searchQuery&&activeView!=='stars';
    const rating=art._rating||0;
    const starsHtml=[1,2,3,4,5].map(n=>`<button class="star-btn ${rating>=n?'lit':''}" onclick="rateArticle('${eid}',${n})">★</button>`).join('');
    const waT=encodeURIComponent(art.title||''),waL=encodeURIComponent(art._link||'');
    return `<div class="article-card" style="animation-delay:${i*0.04}s" id="card-${eid}">
      ${imgHtml}
      <div class="card-source-bar">
        <div class="source-dot"></div><div class="source-name">${art._source}</div>
        ${timeStr?`<div class="pub-time">${timeStr}</div>`:''}
        ${art._il?'<span class="badge badge-il">🇮🇱</span>':''}
        ${isNew?'<span class="badge badge-new">חדש</span>':''}
        ${recOn&&art._score>0?'<span class="badge badge-rec">✨</span>':''}
        ${art._isSearch?'<span class="badge badge-search">🔍</span>':''}
      </div>
      <div class="card-body">
        <div class="card-title">${art.title||''}</div>
        <div class="card-summary">${art.summary||''}</div>
        <div class="card-actions">
          <button class="action-btn ${isSaved?'saved':''}" onclick="toggleSave('${eid}')">${isSaved?'⭐ שמור':'☆ שמור'}</button>
          ${art._link?`<button class="action-btn wa-btn" onclick="doShare('${waT}','${waL}')">📲 שתף</button>`:''}
          ${art._link?`<a class="card-link" href="${art._link}" target="_blank">קרא מקור ↗</a>`:''}
        </div>
        <div class="rating-bar">
          <div class="rating-label">עניין אותי:</div>
          <div class="stars-row" id="stars-${eid}">${starsHtml}</div>
          <span class="rating-txt" id="rtxt-${eid}">${rating>0?LABELS[rating]:''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function rateArticle(eid,rating){
  const art=allArticles.find(a=>escId(a._id)===eid)||searchExtra.find(a=>escId(a._id)===eid);
  if(!art)return;
  const old=art._rating||0,nw=old===rating?0:rating;
  if(old>0)unlearnRating(art,old);
  if(nw>0)learnFromRating(art,nw);
  art._rating=nw;
  const ratings=JSON.parse(localStorage.getItem('g_ratings')||'{}');
  if(nw===0)delete ratings[eid];else ratings[eid]=nw;
  persist('g_ratings',ratings);
  const row=document.getElementById('stars-'+eid);
  if(row)row.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('lit',i<nw));
  const rtxt=document.getElementById('rtxt-'+eid);
  if(rtxt)rtxt.textContent=nw>0?LABELS[nw]:'';
}

function doShare(encTitle,encLink){
  const title=decodeURIComponent(encTitle),link=decodeURIComponent(encLink),text=title+'\n'+link;
  if(navigator.share)navigator.share({title,url:link,text}).catch(()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'));
  else window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

function toggleSave(eid){
  const art=allArticles.find(a=>escId(a._id)===eid)||searchExtra.find(a=>escId(a._id)===eid);
  if(!art)return;
  const idx=saved.findIndex(s=>escId(s._id)===eid);
  if(idx>-1)saved.splice(idx,1);else saved.unshift({...art});
  persist('g_saved',saved);
  const btn=document.querySelector(`#card-${eid} .action-btn:not(.wa-btn)`);
  if(btn){const is=saved.some(s=>escId(s._id)===eid);btn.textContent=is?'⭐ שמור':'☆ שמור';btn.classList.toggle('saved',is);}
  updateSavedTab();
}
function updateSavedTab(){document.getElementById('tb-saved').textContent=saved.length?`⭐ (${saved.length})`:'⭐ שמורות';}
function renderSaved(){
  const hdr=document.getElementById('saved-header'),el=document.getElementById('saved-content');
  if(!saved.length){hdr.innerHTML='';el.innerHTML=`<div class="empty-state"><div class="empty-emoji">⭐</div><div class="empty-title">אין כתבות שמורות</div><div class="empty-sub">לחץ "שמור" לשמירת כתבות</div></div>`;return;}
  hdr.innerHTML=`<div class="saved-meta"><span>${saved.length} כתבות שמורות</span><button class="clear-btn" onclick="clearSaved()">מחק הכל</button></div>`;
  el.innerHTML=saved.map((art,i)=>{
    const imgHtml=art._img?`<img class="card-img" src="${art._img}" onerror="this.style.display='none'" loading="lazy">`:'';
    const waT=encodeURIComponent(art.title||''),waL=encodeURIComponent(art._link||'');
    return `<div class="article-card" style="animation-delay:${i*0.05}s">
      ${imgHtml}
      <div class="card-source-bar"><div class="source-dot"></div><div class="source-name">${art._source}</div><div class="pub-time">${formatTime(art._pubDate)}</div></div>
      <div class="card-body">
        <div class="card-title">${art.title||''}</div>
        <div class="card-summary">${art.summary||''}</div>
        <div class="card-actions">
          <button class="action-btn saved" onclick="removeSaved(${i})">⭐ הסר</button>
          ${art._link?`<button class="action-btn wa-btn" onclick="doShare('${waT}','${waL}')">📲 שתף</button>`:''}
          ${art._link?`<a class="card-link" href="${art._link}" target="_blank">קרא מקור ↗</a>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}
function removeSaved(i){saved.splice(i,1);persist('g_saved',saved);renderSaved();updateSavedTab();}
function clearSaved(){if(confirm('למחוק הכל?')){saved=[];persist('g_saved',saved);renderSaved();updateSavedTab();}}

function addStar(){
  const val=document.getElementById('star-input').value.trim();
  if(!val){document.getElementById('star-err').textContent='נא להזין שם';return;}
  if(stars.find(s=>s.toLowerCase()===val.toLowerCase())){document.getElementById('star-err').textContent='כוכב זה כבר ברשימה';return;}
  stars.push(val);persist('g_stars',stars);
  document.getElementById('star-input').value='';document.getElementById('star-err').textContent='';renderStars();
}
function removeStar(i){stars.splice(i,1);persist('g_stars',stars);renderStars();}
function renderStars(){
  const el=document.getElementById('stars-list');
  if(!stars.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:18px 0">אין כוכבים עדיין</div>';return;}
  el.innerHTML=stars.map((s,i)=>`<div class="star-item"><div class="star-avatar">${s.charAt(0).toUpperCase()}</div><div class="star-name">${s}</div><button class="star-del" onclick="removeStar(${i})">×</button></div>`).join('');
}

function addSite(id,name,icon,il,feed){
  if(sites.find(s=>s.id===id)){setErr('האתר כבר ברשימה',il);return;}
  sites.push({id,name,icon,il,feed});persist('g_sites_v4',sites);renderSites();setErr('',il);
}
function addManual(il){
  const inp=document.getElementById(il?'il-url-input':'en-url-input');
  let val=inp.value.trim();
  if(!val){setErr('נא להזין כתובת',il);return;}
  const feed=val.startsWith('http')?val:null;
  const id=val.replace(/^https?:\/\//,'').replace(/[^a-z0-9.-]/gi,'_').slice(0,40);
  if(sites.find(s=>s.id===id)){setErr('האתר כבר קיים',il);return;}
  const name=id.split('.')[0];
  sites.push({id,name:name.charAt(0).toUpperCase()+name.slice(1),icon:il?'🇮🇱':'📰',il,feed});
  persist('g_sites_v4',sites);renderSites();inp.value='';setErr('',il);
}
function removeSite(i){sites.splice(i,1);persist('g_sites_v4',sites);renderSites();}
function setErr(msg,il){const el=document.getElementById(il?'il-err-msg':'en-err-msg');if(el)el.textContent=msg;}
function renderSites(){
  const el=document.getElementById('sites-list');
  if(!sites.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:18px 0">אין אתרים.</div>';return;}
  el.innerHTML=sites.map((s,i)=>`
    <div class="site-item ${s.il?'il':''}">
      <div class="site-icon ${s.il?'il':''}">${s.icon||'📰'}</div>
      <div class="site-info"><div class="site-info-name">${s.name}</div><div class="site-info-url">${s.feed||s.id}</div></div>
      <button class="del-btn" onclick="removeSite(${i})">×</button>
    </div>`).join('');
  document.querySelectorAll('.preset-btn').forEach(btn=>{
    const m=btn.getAttribute('onclick').match(/addSite\('([^']+)'/);
    if(m)btn.classList.toggle('added',!!sites.find(s=>s.id===m[1]));
  });
}
function skelCard(){return`<div class="skeleton-card"><div style="padding:6px 12px;border-bottom:1px solid rgba(194,24,91,0.1)"><div class="skel" style="height:10px;width:65px"></div></div><div style="padding:11px 13px"><div class="skel" style="height:14px;width:90%;margin-bottom:6px"></div><div class="skel" style="height:12px;width:55%;margin-bottom:9px"></div><div class="skel" style="height:50px"></div></div></div>`;}

window.addEventListener('load',()=>{loadData();renderSites();renderStars();updateSavedTab();});
</script>
