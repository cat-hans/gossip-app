<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gossip Feed 💅</title>

<style>
body {font-family: Arial; background:#111; color:white; margin:0;}
.header {padding:15px; text-align:center; background:#222;}
.card {background:#1e1e1e; margin:10px; padding:10px; border-radius:10px;}
a {color:#4da6ff; text-decoration:none;}
</style>

</head>
<body>

<div class="header">🔥 Gossip Feed</div>
<div id="feed"></div>

<script>
const feeds = [
  "https://api.rss2json.com/v1/api.json?rss_url=https://people.com/feed",
  "https://api.rss2json.com/v1/api.json?rss_url=https://www.tmz.com/feed/",
  "https://api.rss2json.com/v1/api.json?rss_url=https://www.mako.co.il/rss/entertainment-celebs.xml",
  "https://api.rss2json.com/v1/api.json?rss_url=https://celebs.walla.co.il"
];

const keywords = [
  'celebrity','celeb','star','actor','actress','singer',
  'hollywood','relationship','dating','divorce',
  'רכילות','סלב','כוכב','זוג','שחקן','זמר'
];

async function load(){
  let all=[];
  for (let url of feeds){
    try{
      let res=await fetch(url);
      let data=await res.json();
      all = all.concat(data.items||[]);
    }catch(e){}
  }

  all = all.filter(a=>{
    let t=((a.title||"")+" "+(a.description||"")).toLowerCase();
    return keywords.some(k=>t.includes(k));
  });

  document.getElementById("feed").innerHTML =
    all.slice(0,50).map(a=>`
      <div class="card">
        <a href="${a.link}" target="_blank">${a.title}</a>
      </div>
    `).join("");
}

load();
</script>

</body>
</html>
